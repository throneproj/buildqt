name: buildqt

on: workflow_dispatch

env:
  QT_VERSION: 6.11.0

jobs:
  windows_msvc_static_release:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@master

    - name: Setup Python
      uses: actions/setup-python@master
      with:
        python-version: '3.14'
        architecture: 'x64'

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v3
      with:
        msbuild-architecture: x64

    - name: Setup vsdevenv
      uses: seanmiddleditch/gha-setup-vsdevenv@master

    - name: Build Qt
      shell: bash
      run: |
        cd ..
        mkdir -p Qt
        cd Qt
        mkdir -p ${{env.QT_VERSION}}
        mkdir -p Qt

        SHORT_VER="${${{ env.QT_VERSION }}%.*}"
        curl -L -o qtbase-everywhere-src.zip https://download.qt.io/official_releases/qt/${SHORT_VER}/${{env.QT_VERSION}}/submodules/qtbase-everywhere-src-${{env.QT_VERSION}}.zip
        unzip -q qtbase-everywhere-src.zip -d ./${{env.QT_VERSION}}
        curl -L -o qttools-everywhere-src.zip https://download.qt.io/official_releases/qt/${SHORT_VER}/${{env.QT_VERSION}}/submodules/qttools-everywhere-src-${{env.QT_VERSION}}.zip
        unzip -q qttools-everywhere-src.zip -d ./${{env.QT_VERSION}}
        curl -L -o qttranslations-everywhere-src.zip https://download.qt.io/official_releases/qt/${SHORT_VER}/${{env.QT_VERSION}}/submodules/qttranslations-everywhere-src-${{env.QT_VERSION}}.zip
        unzip -q qttranslations-everywhere-src.zip -d ./${{env.QT_VERSION}}
        curl -L -o qtsvg-everywhere-src.zip https://download.qt.io/official_releases/qt/${SHORT_VER}/${{env.QT_VERSION}}/submodules/qtsvg-everywhere-src-${{env.QT_VERSION}}.zip
        unzip -q qtsvg-everywhere-src.zip -d ./${{env.QT_VERSION}}
        curl -L -o openssl.7z https://github.com/throneproj/env_windows_legacy/releases/download/latest/openssl-msvc.7z
        7z x openssl.7z

        cmd.exe /c "call `"D:\a\buildqt\buildqt\buildqt.bat`" ${{env.QT_VERSION}}"

    - name: Package binaries
      run: |
        7z a Qt_${{env.QT_VERSION}}.7z ../Qt/Qt -mx=9

    - uses: actions/upload-artifact@master
      with:
        name: Qt_${{env.QT_VERSION}}
        path: Qt_${{env.QT_VERSION}}.7z

    - name: Release
      uses: svenstaro/upload-release-action@master
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        tag: Qt_${{env.QT_VERSION}}
        file: Qt_${{env.QT_VERSION}}.7z
        overwrite: true
